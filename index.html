<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小百的 AI 知识库 · 课程菜单</title>
  <meta http-equiv="refresh" content="3;url=./menu.html">
  <meta name="description" content="已迁移到 menu.html · 3 秒后自动跳转">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
      background: linear-gradient(135deg, #F8F7F4 0%, #E8F0F9 50%, #F7F1E5 100%);
      color: #1A1F2E;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 20px;
      text-align: center;
    }
    .icon {
      font-size: 72px;
      margin-bottom: 24px;
      animation: bounce 1.4s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    h1 {
      font-size: 32px; font-weight: 800;
      color: #1A1F2E;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }
    h1 span {
      background: linear-gradient(90deg, #3A6FA8 0%, #B89B6A 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .sub {
      font-size: 16px; color: #5e6f88;
      margin-bottom: 32px;
      max-width: 480px;
      line-height: 1.6;
    }
    .redirect-btn {
      display: inline-block;
      background: linear-gradient(135deg, #3A6FA8 0%, #2A5278 100%);
      color: #fff;
      padding: 16px 36px;
      border-radius: 30px;
      font-size: 17px;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 4px 16px rgba(58, 111, 168, 0.25);
      transition: all 0.2s;
    }
    .redirect-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(58, 111, 168, 0.35);
    }
    .url-hint {
      margin-top: 28px;
      font-size: 13px; color: #8A93A6;
      font-family: "SF Mono", Consolas, monospace;
      background: rgba(255,255,255,0.6);
      padding: 10px 18px;
      border-radius: 12px;
      border: 1px solid #E8E5DE;
    }
    .loader {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #3A6FA8;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="icon">📚</div>
  <h1>小百的 <span>AI 知识库</span></h1>
  <p class="sub">
    课程菜单已迁移到 <strong>menu.html</strong><br>
    3 秒后自动跳转到最新内容（v3.5）
  </p>
  <a class="redirect-btn" href="./menu.html">
    <span class="loader"></span>立即前往 →
  </a>
  <div class="url-hint">vinkinyyx.github.io/vinkin-ai-knowledge/menu.html</div>

  <script>
    // JS fallback for browsers that block meta refresh
    setTimeout(function() {
      window.location.replace('./menu.html');
    }, 3000);
  </script>
</body>
</html>
