<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #fff; }
  .icon {
    width: 200px; height: 200px; border-radius: 40px;
    background: linear-gradient(135deg, #3A6FA8 0%, #2A5278 100%);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    box-shadow: 0 4px 12px rgba(42,82,120,0.25);
  }
  /* 主齿轮（占满图标 85%） */
  .main-gear {
    width: 160px; height: 160px;
    position: relative;
  }
  /* 右上角小齿轮（次要） */
  .sub-gear {
    position: absolute; top: 14px; right: 14px;
    width: 24px; height: 24px;
    opacity: 0.4;
  }
  /* 右下角活动状态点 */
  .live {
    position: absolute; bottom: 16px; right: 16px;
    width: 10px; height: 10px; border-radius: 50%;
    background: #7FD962;
    box-shadow: 0 0 0 3px rgba(127,217,98,0.3);
  }
</style>
</head>
<body>
<div class="icon">
  <!-- 右上角小齿轮（弱化） -->
  <svg class="sub-gear" viewBox="0 0 24 24" fill="#FFFFFF">
    <g transform="translate(12 12)">
      <rect x="-1.5" y="-10" width="3" height="4" rx="0.4"/>
      <rect x="-1.5" y="-10" width="3" height="4" rx="0.4" transform="rotate(60)"/>
      <rect x="-1.5" y="-10" width="3" height="4" rx="0.4" transform="rotate(120)"/>
      <rect x="-1.5" y="-10" width="3" height="4" rx="0.4" transform="rotate(180)"/>
      <rect x="-1.5" y="-10" width="3" height="4" rx="0.4" transform="rotate(240)"/>
      <rect x="-1.5" y="-10" width="3" height="4" rx="0.4" transform="rotate(300)"/>
    </g>
  </svg>
  
  <!-- 主齿轮：12 齿，金色描边版本 -->
  <svg class="main-gear" viewBox="0 0 160 160">
    <!-- 12 个矩形齿（外径 78，齿长 12，齿宽 14） -->
    <g transform="translate(80 80)">
      <rect x="-7" y="-78" width="14" height="14" rx="1.5" fill="#FFD56A"/>
      <rect x="-7" y="-78" width="14" height="14" rx="1.5" fill="#FFD56A" transform="rotate(30)"/>
      <rect x="-7" y="-78" width="14" height="14" rx="1.5" fill="#FFD56A" transform="rotate(60)"/>
      <rect x="-7" y="-78" width="14" height="14" rx="1.5" fill="#FFD56A" transform="rotate(90)"/>
      <rect x="-7" y="-78" width="14" height="14" rx="1.5" fill="#FFD56A" transform="rotate(120)"/>
      <rect x="-7" y="-78" width="14" height="14" rx="1.5" fill="#FFD56A" transform="rotate(150)"/>
      <rect x="-7" y="-78" width="14" height="14" rx="1.5" fill="#FFD56A" transform="rotate(180)"/>
      <rect x="-7" y="-78" width="14" height="14" rx="1.5" fill="#FFD56A" transform="rotate(210)"/>
      <rect x="-7" y="-78" width="14" height="14" rx="1.5" fill="#FFD56A" transform="rotate(240)"/>
      <rect x="-7" y="-78" width="14" height="14" rx="1.5" fill="#FFD56A" transform="rotate(270)"/>
      <rect x="-7" y="-78" width="14" height="14" rx="1.5" fill="#FFD56A" transform="rotate(300)"/>
      <rect x="-7" y="-78" width="14" height="14" rx="1.5" fill="#FFD56A" transform="rotate(330)"/>
    </g>
    
    <!-- 主体圆盘（深蓝填充，因为是图标背景的延伸） -->
    <circle cx="80" cy="80" r="62" fill="#2A5278" stroke="#FFD56A" stroke-width="3"/>
    
    <!-- 内部 3 个箭头（环形布局，代表"工程化"持续运转） -->
    <g transform="translate(80 80)">
      <path d="M -28 -10 A 30 30 0 0 1 14 -26 L 14 -18 L 24 -28 L 14 -38 L 14 -30 A 36 36 0 0 0 -34 -10 Z" fill="#FFD56A" opacity="0.85"/>
      <path d="M 28 10 A 30 30 0 0 1 -14 26 L -14 18 L -24 28 L -14 38 L -14 30 A 36 36 0 0 0 34 10 Z" fill="#FFD56A" opacity="0.85"/>
    </g>
    
    <!-- 中心 "AI" 文字 -->
    <text x="80" y="93" text-anchor="middle" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif" font-size="38" font-weight="900" fill="#FFFFFF" letter-spacing="-1">AI</text>
  </svg>
  
  <span class="live"></span>
</div>
</body></html>
